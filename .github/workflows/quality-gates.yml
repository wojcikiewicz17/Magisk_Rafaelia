name: Quality Gates

# Comprehensive quality checks for the Magisk_Rafaelia project
# Stricter checks for master branch

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  determine-strictness:
    name: Determine Quality Level
    runs-on: ubuntu-latest
    outputs:
      is_main: ${{ steps.check.outputs.is_main }}
      strictness: ${{ steps.check.outputs.strictness }}
    
    steps:
      - name: Check target branch
        id: check
        run: |
          TARGET="${{ github.base_ref || github.ref_name }}"
          
          if [[ "$TARGET" == "master" || "$TARGET" == "refs/heads/master" ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "strictness=high" >> $GITHUB_OUTPUT
            echo "🔒 High strictness for master branch"
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "strictness=normal" >> $GITHUB_OUTPUT
            echo "🔓 Normal strictness for other branches"
          fi

  code-quality:
    name: Code Quality Check
    needs: determine-strictness
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check Python files
        run: |
          echo "Checking Python code quality..."
          
          # Find Python files
          PYTHON_FILES=$(find . -name "*.py" -not -path "./out/*" -not -path "./.git/*" | head -20)
          
          if [ -n "$PYTHON_FILES" ]; then
            echo "Found Python files, checking syntax..."
            for file in $PYTHON_FILES; do
              python3 -m py_compile "$file" || echo "Syntax error in $file"
            done
          fi
      
      - name: Check shell scripts
        run: |
          echo "Checking shell scripts..."
          
          # Find shell scripts
          SHELL_FILES=$(find . -name "*.sh" -not -path "./out/*" -not -path "./.git/*" | head -20)
          
          if [ -n "$SHELL_FILES" ]; then
            for file in $SHELL_FILES; do
              if command -v shellcheck &> /dev/null; then
                shellcheck "$file" || echo "Issues in $file"
              else
                bash -n "$file" || echo "Syntax error in $file"
              fi
            done
          fi

  dependency-audit:
    name: Dependency Baseline Audit
    needs: determine-strictness
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Run dependency baseline audit
        run: python3 .github/scripts/dependency_audit.py

  documentation-check:
    name: Documentation Check
    needs: determine-strictness
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out
        uses: actions/checkout@v4
      
      - name: Check required documentation
        run: |
          echo "Checking required documentation files..."
          
          REQUIRED_DOCS=(
            "README.MD"
            "CONTRIBUTING.md"
            "docs/BRANCHING_STRATEGY.md"
          )
          
          MISSING_DOCS=()
          
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              MISSING_DOCS+=("$doc")
              echo "❌ Missing: $doc"
            else
              echo "✅ Found: $doc"
            fi
          done
          
          if [ ${#MISSING_DOCS[@]} -gt 0 ]; then
            echo "Missing documentation files: ${MISSING_DOCS[*]}"
            if [ "${{ needs.determine-strictness.outputs.is_main }}" == "true" ]; then
              echo "::error::Missing required documentation for master branch"
              exit 1
            else
              echo "::warning::Missing documentation files"
            fi
          fi
      
      - name: Check for broken links in markdown
        run: |
          echo "Checking for obvious broken links..."
          
          # Simple check for common broken link patterns
          if grep -r "\[.*\](http://localhost" docs/ 2>/dev/null; then
            echo "::warning::Found localhost links in documentation"
          fi

  build-validation:
    name: Build Validation
    needs: determine-strictness
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Validate build script
        run: |
          echo "Validating build.py..."
          
          if [ -f "build.py" ]; then
            python3 -m py_compile build.py
            echo "✅ build.py syntax is valid"
          else
            echo "::error::build.py not found"
            exit 1
          fi
      
      - name: Check for critical files
        run: |
          echo "Checking for critical files..."
          
          CRITICAL_FILES=(
            "build.py"
            "app/build.gradle.kts"
          )
          
          for file in "${CRITICAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
            else
              echo "::warning::Missing: $file (may be expected)"
            fi
          done

  security-check:
    name: Security Check
    needs: determine-strictness
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out
        uses: actions/checkout@v4
      
      - name: Check for secrets
        run: |
          echo "Checking for potential secrets..."
          
          # Check for common secret patterns
          if grep -r -i "password\s*=\s*['\"]" . --exclude-dir=.git --exclude-dir=out 2>/dev/null | grep -v "example\|sample\|test"; then
            echo "::warning::Found potential hardcoded passwords"
          fi
          
          if grep -r "api[_-]key\s*=\s*['\"][a-zA-Z0-9]" . --exclude-dir=.git --exclude-dir=out 2>/dev/null; then
            echo "::warning::Found potential API keys"
          fi
          
          echo "Basic secret scan completed"
      
      - name: Check file permissions
        run: |
          echo "Checking for sensitive file permissions..."
          
          # Check for overly permissive files (not critical, just informational)
          find . -type f -perm -o+w -not -path "./.git/*" -not -path "./out/*" | head -10 || true

  governance-compliance:
    name: Governance Compliance (ativar.txt v999)
    needs: determine-strictness
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out
        uses: actions/checkout@v4
      
      - name: Verify governance framework
        run: |
          echo "==================================================================="
          echo "GOVERNANCE COMPLIANCE CHECK - ativar.txt v999"
          echo "==================================================================="
          
          # Check for ativar.txt v999
          if [ -f "ativar.txt" ]; then
            echo "✅ ativar.txt v999 found"
            if grep -q "v999\|Version: 999" ativar.txt; then
              echo "✅ Version v999 confirmed"
            else
              echo "⚠️ Version marker verification failed"
            fi
          else
            echo "❌ ativar.txt v999 not found"
            exit 1
          fi
          
          # Check for governance implementation document
          if [ -f "GOVERNANCE_IMPLEMENTATION.md" ]; then
            echo "✅ Governance implementation guide found"
          else
            echo "⚠️ Governance implementation guide recommended"
          fi
      
      - name: Run governance validator
        run: |
          if [ -f ".github/scripts/governance_validator.sh" ]; then
            chmod +x .github/scripts/governance_validator.sh
            ./.github/scripts/governance_validator.sh || echo "Governance validation completed with warnings"
          else
            echo "Governance validator script not found"
          fi
        continue-on-error: true
      
      - name: Check standards compliance markers
        run: |
          echo "Checking for standards compliance markers..."
          
          # ISO standards
          echo "ISO Standards:"
          grep -l "ISO.*9001\|ISO.*27001\|ISO.*25010" *.md 2>/dev/null | head -5 || echo "  No ISO references in root docs"
          
          # IEEE standards
          echo "IEEE Standards:"
          grep -l "IEEE.*830\|IEEE.*1012\|IEEE.*12207" *.md 2>/dev/null | head -5 || echo "  No IEEE references in root docs"
          
          # NIST standards
          echo "NIST Standards:"
          grep -l "NIST\|800-53\|Cybersecurity Framework" *.md 2>/dev/null | head -5 || echo "  No NIST references in root docs"
          
          echo "Standards compliance check complete"
      
      - name: Ethics framework verification (Ethica[8])
        run: |
          echo "Verifying Ethica[8] framework..."
          
          if grep -rq "Ethica\[8\]\|ethical.principles" *.md *.txt 2>/dev/null; then
            echo "✅ Ethica[8] framework referenced"
          else
            echo "⚠️ Ethica[8] framework documentation recommended"
          fi

  adaptive-summary:
    name: Quality Gates Summary
    needs: [determine-strictness, code-quality, documentation-check, build-validation, security-check, governance-compliance]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target Branch**: ${{ github.base_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Strictness Level**: ${{ needs.determine-strictness.outputs.strictness }}" >> $GITHUB_STEP_SUMMARY
          echo "**Governance**: ativar.txt v999 ACTIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          RESULTS=(
            "Code Quality:${{ needs.code-quality.result }}"
            "Documentation:${{ needs.documentation-check.result }}"
            "Build Validation:${{ needs.build-validation.result }}"
            "Security Check:${{ needs.security-check.result }}"
            "Governance Compliance:${{ needs.governance-compliance.result }}"
          )
          
          for result in "${RESULTS[@]}"; do
            NAME="${result%%:*}"
            STATUS="${result##*:}"
            
            if [ "$STATUS" == "success" ]; then
              echo "- ✅ $NAME: Passed" >> $GITHUB_STEP_SUMMARY
            elif [ "$STATUS" == "failure" ]; then
              echo "- ❌ $NAME: Failed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ⚠️ $NAME: $STATUS" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Governance Framework" >> $GITHUB_STEP_SUMMARY
          echo "- Standards: ISO, IEEE, NIST, ITU-T, W3C, ABNT" >> $GITHUB_STEP_SUMMARY
          echo "- Ethics: Ethica[8] Framework" >> $GITHUB_STEP_SUMMARY
          echo "- Improvement: Infinite Feedback Loop" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.determine-strictness.outputs.is_main }}" == "true" ]; then
            echo "🔒 **High quality standards enforced for master branch**" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔓 **Normal quality checks for other branches**" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check overall status
        run: |
          if [ "${{ needs.code-quality.result }}" == "failure" ] || \
             [ "${{ needs.build-validation.result }}" == "failure" ]; then
            echo "Critical checks failed"
            exit 1
          fi
          
          if [ "${{ needs.determine-strictness.outputs.is_main }}" == "true" ]; then
            if [ "${{ needs.documentation-check.result }}" == "failure" ] || \
               [ "${{ needs.security-check.result }}" == "failure" ] || \
               [ "${{ needs.governance-compliance.result }}" == "failure" ]; then
              echo "Main branch quality gates not met"
              exit 1
            fi
          fi
          
          echo "All required quality gates passed"
