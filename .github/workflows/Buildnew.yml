name: Build Magisk_Rafaelia - Multi-Architecture

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  CARGO_HOME: ${{ github.workspace }}/.cargo
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: echo "matrix={\"include\":[{\"abi\":\"arm64-v8a\",\"target\":\"aarch64-linux-android\"},{\"abi\":\"armeabi-v7a\",\"target\":\"thumbv7neon-linux-androideabi\"}]}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJSON(needs.setup.outputs.matrix)}}
      fail-fast: false
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download NDK
        run: |
          echo "Downloading Android NDK..."
          sdkmanager --install "ndk;29.2.11058015" --sdk_root=$ANDROID_HOME

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly-2026-04-17
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'native/src'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create build config
        run: |
          cat > config.prop << EOF
          abiList=${{ matrix.abi }}
          version=${{ github.sha }}
          versionCode=$(date +%s)
          EOF
          cat config.prop

      - name: Setup NDK
        run: python3 build.py ndk

      - name: Native preflight (xz + build.py)
        run: |
          python3 -m py_compile build.py
          cc -fsyntax-only native/src/external/xz-embedded/xz_crc32.c
          cc -fsyntax-only native/src/external/xz-embedded/xz_dec_lzma2.c
          cc -fsyntax-only native/src/external/xz-embedded/xz_dec_stream.c

      - name: Build native binaries
        run: python3 build.py native -r -v
        timeout-minutes: 60

      - name: Build APK
        run: python3 build.py app -r -v
        timeout-minutes: 60

      - name: List artifacts
        run: |
          echo "Build artifacts:"
          find out -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
          find out -type f -name "*.so" 2>/dev/null | head -20 || echo "No shared libraries found"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: magisk-${{ matrix.abi }}-${{ github.sha }}
          path: |
            out/*.apk
            out/**/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ matrix.abi }}
          path: |
            .gradle/
            native/

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: |
          echo "Downloaded build artifacts:"
          find . -type f -name "*.apk" -exec ls -lh {} \;

      - name: Verify APK files
        run: |
          for apk in $(find . -name "*.apk" -type f); do
            echo "Checking APK: $apk"
            unzip -t "$apk" > /dev/null 2>&1 && echo "✓ Valid APK" || echo "✗ Invalid APK"
          done

  status:
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.integration-test.result }}" = "success" ]; then
            echo "✓ Build completed successfully"
            exit 0
          else
            echo "✗ Build failed or incomplete"
            exit 1
          fi

      - name: Create summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
