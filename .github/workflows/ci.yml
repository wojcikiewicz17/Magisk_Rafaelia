name: CI Canonical (Build + Validation)

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'native/**'
      - 'build.py'
      - 'scripts/**'
      - '.github/actions/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Pre-CI validation
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pre-CI validation (strict)
        run: python3 scripts/pre_ci_validate.py --skip-slow

  build-debug:
    name: Build debug artifacts
    runs-on: ubuntu-24.04
    needs: validate
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build debug
        run: ./build.py -v all

      - name: Stop Gradle daemon
        run: ./app/gradlew --stop

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-debug-${{ github.sha }}
          path: |
            out
            app/apk/build/outputs
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
