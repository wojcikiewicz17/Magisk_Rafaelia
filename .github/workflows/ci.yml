name: RAFAELIA CI - native & android (full pipeline)

on:
  push:
    branches: [master]  # Updated to use master branch
  pull_request:
    branches: [master]  # Support PRs to master branch

env:
  EMULATOR_NAME: test

jobs:
  native-build:
    name: Native build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set executable permissions for scripts
        run: |
          echo "Setting executable permissions for all scripts..."
          find . -type f -name "*.sh" -exec chmod +x {} \;
          find . -type f -name "*.py" -exec chmod +x {} \;
          echo "Permissions set successfully"

      - name: Activate RAFAELIA (ativar.txt)
        id: activate_rafaelia_native
        run: |
          echo "=========================================="
          echo "RAFAELIA Activation - Reading ativar.txt"
          echo "=========================================="
          if [ ! -f "ativar.txt" ]; then
            echo "::error::Required activation file 'ativar.txt' not found."
            exit 1
          fi
          cat "ativar.txt"
          echo "=========================================="
          echo "RAFAELIA activation marker read successfully."
          {
            echo "# Native Build Summary"
            echo ""
            echo "✅ **RAFAELIA Activation**: ativar.txt read successfully"
          } >> $GITHUB_STEP_SUMMARY

      - name: Setup deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            zlib1g-dev liblzma-dev liblz4-dev libssl-dev ca-certificates \
            cpio gzip zip jq

      - name: Configure build dir
        working-directory: native
        run: mkdir -p build

      - name: CMake
        working-directory: native/build
        run: cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: native/build
        run: cmake --build . --parallel

      - name: Run native test harness
        working-directory: native/build
        run: |
          if [ -x ./test_sha ]; then
            mkdir -p ../tests
            if [ ! -f ../tests/fixture_boot.img ]; then
              dd if=/dev/urandom of=../tests/fixture_boot.img bs=1024 count=32
            fi
            if [ ! -f ../tests/fixture_ramdisk.cpio.gz ]; then
              tmp=$(mktemp -d)
              echo "hello" > $tmp/f1.txt
              echo "bye" > $tmp/f2.txt
              (cd $tmp && find . -print0 | cpio --null -ov \
                --format=newc > ../ramdisk.cpio)
              gzip -c $tmp/../ramdisk.cpio > ../tests/fixture_ramdisk.cpio.gz
              rm -rf $tmp
            fi
            ./test_sha ../tests/fixture_boot.img \
              ../tests/fixture_ramdisk.cpio.gz
          fi

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-artifacts
          path: native/build

  android-build:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    needs: native-build
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set executable permissions for scripts
        run: |
          echo "Setting executable permissions for all scripts..."
          find . -type f -name "*.sh" -exec chmod +x {} \;
          find . -type f -name "*.py" -exec chmod +x {} \;
          echo "Permissions set successfully"

      - name: Activate RAFAELIA (ativar.txt)
        id: activate_rafaelia_android
        run: |
          echo "=========================================="
          echo "RAFAELIA Activation - Reading ativar.txt"
          echo "=========================================="
          if [ ! -f "ativar.txt" ]; then
            echo "::error::Required activation file 'ativar.txt' not found."
            exit 1
          fi
          cat "ativar.txt"
          echo "=========================================="
          echo "RAFAELIA activation marker read successfully."

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android SDK & tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.2
            cmdline-tools;latest
            emulator
            system-images;android-33;google_apis;x86_64

      - name: Accept licenses
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            --licenses

      - name: Setup Magisk NDK
        run: python3 build.py ndk
        continue-on-error: false

      - name: Build APK using build.py
        id: build
        run: python3 build.py -v all
        continue-on-error: true

      - name: Verify APK was generated
        id: verify
        run: |
          echo "Verifying APK generation..."
          if [ -f "out/app-debug.apk" ]; then
            echo "✅ Debug APK generated successfully"
            ls -lh out/app-debug.apk
            echo "apk_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found in expected location"
            echo "Contents of out/ directory:"
            ls -la out/ || echo "out/ directory does not exist"
            echo "apk_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate manifest (artifact)
        if: steps.verify.outputs.apk_exists == 'true'
        run: |
          .github/scripts/generate_manifest.sh \
            out/app-debug.apk \
            RAFAELIA_MANIFEST.json

      - name: Upload APK & manifest
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: android-artifacts
          path: |
            out/app-debug.apk
            RAFAELIA_MANIFEST.json
      
      - name: Build Summary
        if: always()
        run: |
          echo "# Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.activate_rafaelia_android.outcome }}" = "success" ]; then
            echo "✅ **RAFAELIA Activation**: ativar.txt read successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **RAFAELIA Activation**: Failed to read ativar.txt" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "out/app-debug.apk" ]; then
            SIZE=$(ls -lh out/app-debug.apk | awk '{print $5}')
            echo "✅ **Debug APK Generated**: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Debug APK**: Build failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "RAFAELIA_MANIFEST.json" ]; then
            echo "✅ **Manifest Generated**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Manifest**: Not generated" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Fail if APK was not generated
        if: steps.verify.outputs.apk_exists != 'true'
        run: |
          echo "::error::APK generation failed. Please review build logs."
          exit 1

  android-instrumented:
    name: Instrumented tests (emulator) and snapshot
    runs-on: ubuntu-latest
    needs: android-build
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup emulator & tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          packages: |
            emulator
            system-images;android-33;google_apis;x86_64
            platform-tools

      - name: Create AVD
        run: |
          echo "no" | \
            ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/avdmanager \
            create avd --force --name ${EMULATOR_NAME} \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel"

      - name: Start emulator
        run: |
          ${ANDROID_SDK_ROOT}/emulator/emulator -avd ${EMULATOR_NAME} \
            -no-window -no-audio -gpu swiftshader_indirect -no-boot-anim &
          adb wait-for-device

      - name: Wait for boot
        run: |
          TIMEOUT=600
          SECONDS=0
          while [ $SECONDS -lt $TIMEOUT ]; do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | \
              tr -d '\r\n')
            if [ "$BOOT" = "1" ]; then echo "booted"; break; fi
            sleep 5
          done
          if [ "$BOOT" != "1" ]; then
            echo "Emulator failed to boot"
            exit 1
          fi

      - name: Start background logcat
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          adb logcat -v time > \
            $GITHUB_WORKSPACE/artifacts/emulator-logcat.txt 2>&1 & \
            echo $! > $GITHUB_WORKSPACE/logcat.pid || true

      - name: Run connectedAndroidTest (continue on error)
        id: instrumented_tests
        run: |
          set -o pipefail
          ./gradlew connectedAndroidTest --no-daemon --stacktrace | \
            tee $GITHUB_WORKSPACE/artifacts/instrumentation-output.txt
        continue-on-error: true

      - name: Check test results
        id: test_result_check
        if: always()
        run: |
          if [ "${{ steps.instrumented_tests.outcome }}" = "failure" ]; then
            echo "⚠️ Instrumented tests failed, but continuing to collect artifacts"
            echo "test_failed=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Instrumented tests passed"
            echo "test_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect artifacts & snapshot
        if: always()
        run: |
          if [ -f $GITHUB_WORKSPACE/logcat.pid ]; then
            kill $(cat $GITHUB_WORKSPACE/logcat.pid) || true
          fi
          adb logcat -d > \
            $GITHUB_WORKSPACE/artifacts/emulator-logcat-final.txt || true
          if adb shell ls /data/tombstones 2>/dev/null | grep -q .; then
            mkdir -p $GITHUB_WORKSPACE/artifacts/tombstones && \
              adb pull /data/tombstones \
              $GITHUB_WORKSPACE/artifacts/tombstones || true
          fi
          if adb shell ls /data/anr 2>/dev/null | grep -q .; then
            mkdir -p $GITHUB_WORKSPACE/artifacts/anr && \
              adb pull /data/anr $GITHUB_WORKSPACE/artifacts/anr || true
          fi
          adb shell dumpsys activity activities > \
            $GITHUB_WORKSPACE/artifacts/dumpsys-activities.txt || true
          if [ -f RAFAELIA_MANIFEST.json ]; then
            cp RAFAELIA_MANIFEST.json $GITHUB_WORKSPACE/artifacts/ || true
          fi
          zip -r $GITHUB_WORKSPACE/rafaelia-instrumented-snapshot.zip \
            $GITHUB_WORKSPACE/artifacts || true

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: emulator-snapshot
          path: rafaelia-instrumented-snapshot.zip

      - name: Cleanup AVD
        if: always()
        run: |
          if ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/avdmanager \
            list avd | grep -q "Name: ${EMULATOR_NAME}"; then
            ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/avdmanager \
              delete avd -n ${EMULATOR_NAME}
          fi
      
      - name: Report test status
        if: always()
        run: |
          echo "## Instrumented Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test_result_check.outputs.test_failed }}" = "true" ]; then
            echo "❌ **Tests Failed**: Check artifacts for details" >> $GITHUB_STEP_SUMMARY
            echo "::warning::Instrumented tests failed. Check the emulator-snapshot artifact for logs."
          else
            echo "✅ **Tests Passed**: All instrumented tests completed successfully" >> $GITHUB_STEP_SUMMARY
          fi
