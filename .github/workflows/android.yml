name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Grant execute permission for build script
      run: chmod +x build.py
    
    - name: Setup Magisk NDK
      run: python3 build.py ndk
      continue-on-error: false

    - name: Native preflight (xz + build.py)
      run: |
        python3 -m py_compile build.py
        cc -fsyntax-only native/src/external/xz-embedded/xz_crc32.c
        cc -fsyntax-only native/src/external/xz-embedded/xz_dec_lzma2.c
        cc -fsyntax-only native/src/external/xz-embedded/xz_dec_stream.c
    
    - name: Build with build.py (debug)
      id: build
      run: python3 build.py -v all
      continue-on-error: true
    
    - name: Verify APK was generated
      run: |
        echo "Checking for generated APK files..."
        if [ -f "out/app-debug.apk" ]; then
          echo "✅ Debug APK found: out/app-debug.apk"
          ls -lh out/app-debug.apk
        else
          echo "❌ Debug APK not found in expected location"
          echo "Contents of out/ directory:"
          ls -la out/ || echo "out/ directory does not exist"
          exit 1
        fi
    
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/logs
          *.log
        retention-days: 7
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('out/app-debug.apk') != ''
      with:
        name: app-debug-apk
        path: out/app-debug.apk
        retention-days: 7
    
    - name: Fail job if build failed
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed. Check build logs for details."
        exit 1
